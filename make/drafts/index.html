<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafts case study | Chip Rian</title>
    <meta name="description" content="Password-protected drafts and explorations case study by Chip Rian.">
    <meta name="author" content="Chip Rian">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://chipdoes.app/make/drafts">
    
    <link rel="icon" type="image/png" href="../../img/favicon.png">
    <link rel="stylesheet" href="../../styles.css">
    <script src="../../js/nav.js" defer></script>
    <script src="../../js/portfolio-case.js" defer></script>
</head>
<body class="portfolio-page">
    <div id="nav-placeholder"></div>
    
    <main class="portfolio-main" data-figma-url="https://broad-trait-75331834.figma.site/drafts">
        <div class="content-container portfolio-container">
            <section class="portfolio-password-panel is-visible" id="portfolio-password-panel" aria-hidden="false">
                <div class="portfolio-password-inner">
                    <div class="portfolio-password-icon" aria-hidden="true">
                        <img src="../../img/key.svg" alt="" />
                    </div>
                    <h2 class="portfolio-password-title">Password protected</h2>
                    <p class="portfolio-password-text">
                        Enter the password to view this page.
                    </p>
                    <form class="portfolio-password-form" id="portfolio-password-form" novalidate>
                        <label class="portfolio-password-label sr-only" for="portfolio-password-input">Password</label>
                        <input
                            id="portfolio-password-input"
                            class="portfolio-password-input"
                            type="password"
                            autocomplete="current-password"
                            required
                        />
                        <div class="portfolio-password-actions">
                            <button type="submit" class="portfolio-password-submit">Submit</button>
                        </div>
                        <p class="portfolio-password-error" id="portfolio-password-error" role="alert" aria-live="polite"></p>
                    </form>
                </div>
            </section>

            <section class="portfolio-case-frame" id="portfolio-case-frame" hidden>
                <div class="portfolio-back-button-container">
                    <div class="portfolio-back-button">
                        <a class="portfolio-back-button-link" aria-label="Back to make" href="/make/">
                            <img src="../../img/arrow-left.svg" alt="Back" />
                            Back to make
                        </a>
                    </div>
                </div>
                <iframe
                    id="portfolio-case-iframe"
                    class="portfolio-case-iframe"
                    title="Drafts case study – Figma embed"
                    data-src="https://broad-trait-75331834.figma.site/drafts"
                    allowfullscreen
                ></iframe>
            </section>
        </div>
    </main>
