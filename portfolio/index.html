<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Chip Rian</title>
    <meta name="description" content="Product design portfolio by Chip Rian.">
    <meta name="author" content="Chip Rian">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://chipdoes.app/portfolio">
    
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <script src="../js/nav.js" defer></script>

<body class="portfolio-page">
    <div id="nav-placeholder"></div>
    
    <main class="portfolio-main">
        <div class="content-container">
            <section class="portfolio-hero">
                <p class="portfolio-eyebrow">Case studies</p>
                <h1 class="portfolio-title">Selected product design work</h1>
                <p class="portfolio-intro">
                    A closer look at how I think, ship, and iterate on real products — from initial problem framing through launch.

            </section>

            <section class="portfolio-grid" aria-label="Case studies">
                <a class="portfolio-card-link" href="/portfolio/drafts/">
                    <article class="portfolio-card">

                    </article>
                </a>

                <a class="portfolio-card-link" href="/portfolio/mobile/">
                    <article class="portfolio-card">
                        <img src="../img/case-study-mobile.png" alt="Preview of mobile case study" class="portfolio-card-image">
                        <h2 class="portfolio-card-title">De-risking Enterprise Renewals for High-Stakes Legal Teams</h2>
                    </article>
                </a>

        </div>
