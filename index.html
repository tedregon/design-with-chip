<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Does App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="logo">ChipDoes.app</a>
            <ul class="nav-links">
                <!-- <li><a href="#apps">Apps</a></li> -->
                <li><a href="https://www.linkedin.com/in/chip-rian/" target="_blank">Contact <img src="img/ArrowUpRight.svg" alt="" class="nav-icon"></a></li>
            </ul>
        </div>
    </nav>
    
    <main>
        <div class="content-container">
            <div class="intro-section">
                Hi, I'm Chip.<br/>Product designer that now builds apps.
            </div>
            <div class="cards-section">
                <a href="mycommunity.html" class="card-link">
                    <div class="card">
                        <div class="card-image">
                            <img src="img/myCommunity-logo.png" alt="myCommunity">
                        </div>

                        <p class="card-description">Solve loneliness through intentional connections</p>
                        <span class="card-chip">beta</span>
                    </div>
                </a>
                
                <a href="steps-counter.html" class="card-link">
                    <div class="card">
                        <div class="card-image">
                            <img src="img/steps-counter-logo.png" alt="stepsCounter">

                        <p class="card-description">Take charge of your health</p>
                        <span class="card-chip">beta</span>
                    </div>
                </a>
                
                <a href="wordjam.html" class="card-link">
                    <div class="card">
                        <div class="card-image">
                            <img src="img/wordJam-logo.png" alt="wordJam">
                        </div>
                        <h3 class="card-title">WordJam</h3>
                        <p class="card-description">Word game to keep your brain challenged</p>
                        <span class="card-chip development">development</span>
